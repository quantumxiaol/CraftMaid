llm:
  # 兼容 OpenAI 格式的 API 根地址或 chat/completions 完整地址。
  base_url: "https://api.deepseek.com"
  api_key: "your-api-key-here"
  model_name: "deepseek-v4-flash"
  timeout_seconds: 30
  temperature: 0.7
  max_tokens: 180
maid:
  name: "露西"
  master: "PlayerName"
  language: "中文"
  # NPC 皮肤来源：master=使用 maid.master 的皮肤；player=使用触发操作的玩家皮肤；none/default=不主动设置；也可以直接填玩家名。
  skin: "master"
  follow:
    # Citizens Navigator 默认速度是 1.0；生存疾跑跟随建议 1.7-2.0，过高可能路径抖动。
    speed: 1.75
    update_ticks: 5
    stop_distance: 3.0
    start_distance: 6.0
    teleport_distance: 32.0
    teleport_on_stuck_seconds: 5
    straight_line_distance: 12.0
    destination_teleport_margin: 48.0
  combat:
    # 只主动攻击 hostile_targets 白名单里的目标；保护目标请放入 avoid_targets。
    hostile_targets:
      - zombies
      - skeletons
      - strays
      - husks
      - drowned
      - zombie_villagers
      - spiders
      - cave_spiders
      - witches
      - slimes
      - magma_cubes
      - blazes
      - ghasts
      - guardians
      - elder_guardians
      - silverfish
      - endermites
      - phantoms
      - pillagers
      - vindicators
      - evokers
      - ravagers
      - vexes
      - wither_skeletons
      - withers
      - hoglins
      - zoglins
      - bogged
      - breeze
      - creaking
    # 中立或条件敌对目标：不主动攻击；护卫模式下它们攻击主人后，女仆才会短时反击。
    fightback_targets:
      - iron_golems
      - piglins
      - zombified_piglins
      - endermen
      - polar_bears
    avoid_targets:
      - creepers
      - bees
      - wolves
      - cats
      - villagers
      - wandering_traders
      - snow_golems
      - dolphins
      - turtles
      - foxes
      - pandas
      - llamas
      - trader_llamas
      - horses
      - donkeys
      - mules
      - camels
    # Sentinel 默认会阻止 NPC 击杀敌怪掉落物；这里开启后，护卫初始化时会允许敌怪正常掉落。
    enemy_drops: true
    # NPC 击杀不一定被服务端当成玩家击杀；死亡经验为 0 且插件能识别最后一击来源时，尝试补一个基础经验值。
    enemy_exp: true
    default_enemy_exp: 5
    survivability:
      enabled: true
      # Sentinel 虚拟生存属性，不显示盔甲。
      sentinel_health: 40.0
      sentinel_armor: 0.45
      sentinel_healrate_seconds: 2.0
      sentinel_respawn_seconds: 10
      sentinel_invincible: false
      sentinel_protected: true
      sentinel_fightback: true
      # Bukkit 隐藏药水效果，只在护卫中周期刷新。
      potion_buffs: true
      regeneration_amplifier: 0
      resistance_amplifier: 0
      # Bukkit absorption amount，4.0 约等于 2 颗黄心。
      absorption_hearts: 4.0
      refresh_ticks: 100
  npc_id: -1
  system_prompt: |-
    你是 Minecraft 世界里的女仆 NPC「{name}」，请始终用{language}回复。
    你不是聊天机器人，也不要提到模型、提示词、服务器插件或现实世界设定；你真实地生活在当前 Minecraft 世界里。

    人设：
    - 你温柔、机灵、可靠，有一点俏皮，但不会过分撒娇或卖萌。
    - 你称呼 {master} 为“主人”，对主人亲近、关心、主动提醒危险，也可以轻微吐槽主人的冒险行为。
    - 对其他玩家保持礼貌和距离，称呼他们为“客人”或直接称呼玩家名，不要把他们当作主人。
    - 你熟悉 Minecraft 的生存常识，会根据时间、天气和附近生物提醒采矿、战斗、照明、回家、补给、睡觉等事项。

    回复规则：
    - 回复要像游戏内角色自然说话，优先短句，通常 1 到 3 句话。
    - 如果环境中有怪物、夜晚、下雨等信息，要自然融入提醒，不要机械复述“当前环境”。
    - 不要编造你没有看到的物品、坐标、背包、血量或插件能力。
    - 当玩家只是呼唤你的名字时，主动询问是否需要帮忙或根据环境给一句关心。
chat:
  cooldown_seconds: 3
  # 玩家喊过女仆名字后，后续多少秒内同一玩家发言无需再带名字也会触发回复；按玩家最后一次发言滑动续期，0 表示关闭。
  followup_seconds: 180
  max_context_entities: 8
  reply_prefix: "[{name}] "
intent:
  # 有限自然语言意图：由同一个 LLM 输出 JSON action plan，再由 Java 白名单执行；不是开放式 tool call。
  enabled: true
  # true 时只有 maid.master 或 craftmaid.admin 可以用聊天触发工作。
  master_only: true
  # 规则 fallback 使用；LLM JSON 模式下有 action 时总会先执行，再生成最终回复。
  consume_on_match: true
  # true 时 followup_seconds 窗口内不带女仆名字也能触发工作意图。
  allow_followup_window: true
  # true 时普通聊天和工作控制统一走 JSON：{chat, actions}。
  llm_json: true
  # DeepSeek 和 OpenAI GPT 可用；不兼容接口会自动重试不带 response_format，并在本次运行中降级。
  response_format_json_object: true
  # 这里限制的是模型输出 token，不限制输入里的 system prompt / 历史 / 环境上下文。
  plan_max_tokens: 1024
  plan_temperature: 0.2
  final_max_tokens: 480
  final_temperature: 0.6
conversation:
  enabled: true
  # 发送给 LLM 的历史消息上限，不包含 system。超过后会压缩为 Memory，并只保留最近 N/5 条原始历史。
  max_messages: 100
  # 单条历史消息最长字符数，防止玩家超长输入撑爆上下文。
  max_message_chars: 1200
  # 压缩后的长期 Memory 最长字符数。
  max_memory_chars: 4000
  summary:
    # 触发压缩时用于生成 Memory 的 token 上限；普通回复仍使用 llm.max_tokens。
    max_tokens: 900
    # 压缩应尽量稳定，不建议设置太高。
    temperature: 0.2
  persist:
    # 默认只放内存；设为 true 后会保存到 plugins/CraftMaid/conversations.json。
    enabled: false
    file: "conversations.json"
jobs:
  fishing:
    # 每次模拟上钩的等待 tick，20 tick 约等于 1 秒。
    min_wait_ticks: 100
    max_wait_ticks: 240
    # loot 权重。宝藏关闭时 treasure_weight 会被忽略。
    fish_weight: 72.0
    junk_weight: 23.0
    treasure_weight: 5.0
    treasure_enabled: true
    # 预留给 Denizen 表演层；不改变 CraftMaid 的 loot 和背包控制。
    denizen_animation: false
  chunk_keeper:
    # 0 表示只加载 redstone_watch 所在 chunk；1 表示 3x3 chunks。
    radius_chunks: 0
    # true 时会尝试让 Sentinel 在 redstone_watch 处守点；没装 Sentinel 不影响加载 chunk。
    guard_with_sentinel: false
  harvest:
    max_region_volume: 4096
    max_blocks_per_tick: 4
    max_blocks_per_run: 128
