name: Build and Release

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build plugin jar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Check formatting
        run: mvn -B spotless:check

      - name: Build with Maven
        run: mvn -B clean package

      - name: Prepare jar artifact
        id: artifact
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t jars < <(find target -maxdepth 1 -type f -name '*.jar' ! -name '*sources.jar' ! -name '*javadoc.jar' | sort)
          if [[ "${#jars[@]}" -eq 0 ]]; then
            echo "No jar was built under target/." >&2
            exit 1
          fi
          jar_path="${jars[0]}"

          version="${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          fi

          artifact_name="CraftMaid-${version}.jar"
          cp "${jar_path}" "${artifact_name}"
          echo "artifact_name=${artifact_name}" >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: craftmaid-jar
          path: ${{ steps.artifact.outputs.artifact_name }}
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_NAME: ${{ steps.artifact.outputs.artifact_name }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${ARTIFACT_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${ARTIFACT_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "CraftMaid ${GITHUB_REF_NAME}" \
              --generate-notes
          fi
